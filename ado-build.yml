trigger:
  - "main"

jobs:
  - job: NET_pipeline
    strategy:
      matrix:
        linux:
          imageName: "ubuntu-latest"
        mac:
          imageName: "macOS-latest"
        windows:
          imageName: "windows-latest"
      maxParallel: 4

    pool:
      vmImage: $(imageName)

    steps:
      - task: UseDotNet@2
        displayName: .NET 8.0 sdk
        inputs:
          version: "8.0.x"
          packageType: sdk

      # Build and test
      - task: PowerShell@2
        displayName: Build and Test
        inputs:
          targetType: filePath
          filePath: ./scripts/BuildAndTest.ps1

      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: "msbuild.binlog"
          artifactName: "binlog"

      - task: ComponentGovernanceComponentDetection@0

  - job: npm_pipeline
    pool:
      vmImage: "windows-latest"
    steps:
      # BuildMultitoolForNpm.ps1 compiles the TypeScript packages too, so Node must be on
      # the PATH before it runs.
      - task: NodeTool@0
        displayName: Use Node.js LTS
        inputs:
          versionSpec: "20.x"

      # Build and stage every npm package: the .NET multitool platform packages and the
      # native-TypeScript @microsoft/sarif and @microsoft/sarif-multitool-ts packages.
      - task: PowerShell@2
        displayName: Build npm packages
        inputs:
          targetType: filePath
          filePath: ./scripts/BuildMultitoolForNpm.ps1
